<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Açaí Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="../css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #4B0082 100%);
            padding: 40px 20px;
        }
        
        .auth-wrapper {
            width: 100%;
            max-width: 500px;
        }
        
        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-logo a {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-family: var(--font-title);
            font-size: 2rem;
            font-weight: 700;
            color: var(--white);
        }
        
        .auth-logo i {
            font-size: 2.5rem;
            color: var(--gold);
        }
        
        .auth-card {
            background: var(--white);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-header h1 {
            font-size: 1.8rem;
            color: var(--gray-900);
            margin-bottom: 8px;
        }
        
        .auth-header p {
            color: var(--gray-600);
        }
        
        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--gray-200);
        }
        
        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-weight: 600;
            color: var(--gray-600);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s ease;
        }
        
        .auth-tab.active {
            color: var(--purple-acai);
            border-bottom-color: var(--purple-acai);
        }
        
        .auth-form {
            display: none;
        }
        
        .auth-form.active {
            display: block;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 8px;
        }
        
        .form-group input {
            padding: 14px 16px;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--purple-acai);
            box-shadow: 0 0 0 4px rgba(75, 0, 130, 0.1);
        }
        
        .auth-form .btn-primary {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            margin-top: 10px;
        }
        
        .auth-divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
        }
        
        .auth-divider span {
            flex: 1;
            height: 1px;
            background: var(--gray-200);
        }
        
        .auth-divider p {
            padding: 0 15px;
            color: var(--gray-500);
            font-size: 0.9rem;
        }
        
        .social-login {
            display: flex;
            gap: 15px;
        }
        
        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
            color: var(--gray-700);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .social-btn:hover {
            border-color: var(--purple-acai);
            color: var(--purple-acai);
        }
        
        .back-home {
            text-align: center;
            margin-top: 25px;
        }
        
        .back-home a {
            color: var(--gray-600);
            font-weight: 500;
        }
        
        .back-home a:hover {
            color: var(--purple-acai);
        }
        
        @media (max-width: 576px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .auth-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-wrapper">
            <div class="auth-logo">
                <a href="../index.html">
                    <i class="fas fa-ice-cream"></i>
                    <span>Açaí Premium</span>
                </a>
            </div>
            
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Bem-vindo!</h1>
                    <p>Entre ou crie sua conta</p>
                </div>
                
                <div class="auth-tabs">
                    <div class="auth-tab active" data-tab="login">Entrar</div>
                    <div class="auth-tab" data-tab="register">Cadastrar</div>
                </div>
                
                <!-- Login Form -->
                <form class="auth-form active" id="loginForm">
                    <div class="form-group" style="margin-bottom: 15px;">
                        <label for="loginEmail">E-mail</label>
                        <input type="email" id="loginEmail" placeholder="seu@email.com" required>
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label for="loginPassword">Senha</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Entrar
                    </button>
                </form>
                
                <!-- Register Form -->
                <form class="auth-form" id="registerForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="regName">Nome Completo</label>
                            <input type="text" id="regName" placeholder="Seu nome" required>
                        </div>
                        <div class="form-group">
                            <label for="regEmail">E-mail</label>
                            <input type="email" id="regEmail" placeholder="seu@email.com" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="regPhone">Telefone</label>
                            <input type="tel" id="regPhone" placeholder="(00) 00000-0000" required>
                        </div>
                        <div class="form-group">
                            <label for="regCPF">CPF</label>
                            <input type="text" id="regCPF" placeholder="000.000.000-00" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="regPassword">Senha</label>
                            <input type="password" id="regPassword" placeholder="••••••••" required>
                        </div>
                        <div class="form-group">
                            <label for="regConfirmPassword">Confirmar Senha</label>
                            <input type="password" id="regConfirmPassword" placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-primary">
                        <i class="fas fa-user-plus"></i> Criar Conta
                    </button>
                </form>
                
                <div class="auth-divider">
                    <span></span>
                    <p>ou</p>
                    <span></span>
                </div>
                
                <div class="social-login">
                    <button class="social-btn">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button class="social-btn">
                        <i class="fab fa-facebook-f"></i> Facebook
                    </button>
                </div>
                
                <div class="back-home">
                    <a href="../index.html">
                        <i class="fas fa-arrow-left"></i> Voltar para home
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script src="../js/main.js"></script>
    <script src="../js/validation.js"></script>
    <script>
        // Tab switching
        const authTabs = document.querySelectorAll('.auth-tab');
        const authForms = document.querySelectorAll('.auth-form');
        
        authTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                authTabs.forEach(t => t.classList.remove('active'));
                authForms.forEach(f => f.classList.remove('active'));
                
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
            });
        });
        
        // Form submission
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Login realizado com sucesso!');
        });
        
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Conta criada com sucesso!');
        });
    </script>
</body>
</html>
