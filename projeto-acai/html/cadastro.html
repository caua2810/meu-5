<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Açaí Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@300;400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/modal.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <header class="header" id="header">
        <div class="header-container">
            <a href="../index.html" class="logo">
                <i class="ph-fill ph-cactus"></i>
                <span>Açaí<span class="logo-accent">Premium</span></span>
            </a>
            <nav class="nav-desktop">
                <a href="../index.html#produtos" class="nav-link">Cardápio</a>
                <a href="../index.html#montar" class="nav-link">Monte o Seu</a>
                <a href="../index.html#sobre" class="nav-link">Sobre</a>
                <a href="../index.html#contato" class="nav-link">Contato</a>
            </nav>
            <div class="header-actions">
                <a href="../index.html" class="back-btn">
                    <i class="ph-bold ph-arrow-left"></i>
                    Voltar
                </a>
            </div>
        </div>
    </header>

    <main class="cadastro-page">
        <div class="cadastro-container">
            <div class="cadastro-card">
                <div class="cadastro-header">
                    <i class="ph-fill ph-cactus"></i>
                    <h1>Criar Conta</h1>
                    <p>Preencha seus dados para continuar</p>
                </div>

                <form class="cadastro-form" id="cadastroForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fullName">Nome Completo *</label>
                            <div class="input-wrapper">
                                <i class="ph-bold ph-user"></i>
                                <input type="text" id="fullName" name="fullName" placeholder="Seu nome completo" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="email">Email *</label>
                            <div class="input-wrapper">
                                <i class="ph-bold ph-envelope"></i>
                                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-row two-col">
                        <div class="form-group">
                            <label for="phone">Telefone *</label>
                            <div class="input-wrapper">
                                <i class="ph-bold ph-phone"></i>
                                <input type="tel" id="phone" name="phone" placeholder="(00) 00000-0000" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="cpf">CPF *</label>
                            <div class="input-wrapper">
                                <i class="ph-bold ph-identification-card"></i>
                                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="cep">CEP *</label>
                            <div class="input-wrapper">
                                <i class="ph-bold ph-map-pin"></i>
                                <input type="text" id="cep" name="cep" placeholder="00000-000" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="address">Endereço *</label>
                            <div class="input-wrapper">
                                <i class="ph-bold ph-house"></i>
                                <input type="text" id="address" name="address" placeholder="Rua/Avenida" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-row two-col">
                        <div class="form-group">
                            <label for="number">Número *</label>
                            <div class="input-wrapper">
                                <input type="text" id="number" name="number" placeholder="123" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="complement">Complemento</label>
                            <div class="input-wrapper">
                                <input type="text" id="complement" name="complement" placeholder="Apto, sala...">
                            </div>
                        </div>
                    </div>

                    <div class="form-row two-col">
                        <div class="form-group">
                            <label for="neighborhood">Bairro *</label>
                            <div class="input-wrapper">
                                <input type="text" id="neighborhood" name="neighborhood" placeholder="Bairro" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="city">Cidade *</label>
                            <div class="input-wrapper">
                                <input type="text" id="city" name="city" placeholder="Cidade" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Senha *</label>
                            <div class="input-wrapper">
                                <i class="ph-bold ph-lock"></i>
                                <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-checkbox">
                        <input type="checkbox" id="promotions" name="promotions">
                        <label for="promotions">Desejo receber promoções exclusivas por email</label>
                    </div>

                    <button type="submit" class="submit-btn">
                        <i class="ph-bold ph-check"></i>
                        Criar Conta
                    </button>
                </form>

                <div class="cadastro-footer">
                    <p>Já tem conta? <a href="#">Fazer login</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/main.js"></script>
    <script src="../js/validation.js"></script>
</body>
</html>
